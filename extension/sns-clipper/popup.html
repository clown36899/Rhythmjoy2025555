<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>댄스빌보드 공유 등록</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="clipper">
      <header class="clipper__header">
        <img class="clipper__mark" src="icons/icon-48.png" alt="" />
        <div>
          <h1>댄스빌보드 공유 등록</h1>
          <p id="clipperSubtitle">YouTube · Instagram</p>
        </div>
      </header>

      <section class="clipper__page">
        <span id="platformBadge" class="clipper__badge">확인 중</span>
        <img id="thumbnailPreview" class="clipper__thumb" alt="" hidden />
        <strong id="pageTitle">현재 페이지를 읽는 중...</strong>
        <small id="pageUrl"></small>
      </section>

      <section id="accountInfo" class="clipper__account-info" hidden>
        <strong>인물 계정으로 등록</strong>
        <dl>
          <div>
            <dt>플랫폼</dt>
            <dd id="accountPlatformText">-</dd>
          </div>
          <div>
            <dt>계정</dt>
            <dd id="accountHandleText">-</dd>
          </div>
          <div>
            <dt>저장 위치</dt>
            <dd id="accountDestinationText">사이트 모음</dd>
          </div>
        </dl>
      </section>

      <label class="clipper__field">
        <span>연결 대상</span>
        <select id="targetMode">
          <option value="production">운영 사이트</option>
          <option value="local">로컬 개발 서버</option>
        </select>
      </label>

      <label class="clipper__field">
        <span>등록 대상</span>
        <select id="captureMode">
          <option value="media">SNS 게시물/영상</option>
          <option value="account">인물 계정</option>
        </select>
      </label>

      <section class="clipper__field clipper__field--wide" data-media-only="true">
        <span>저장 위치</span>
        <div id="playlistBrowser" class="clipper-folder" aria-live="polite">
          <div class="clipper-folder__top">
            <div class="clipper-folder__path">
              <button id="folderBackButton" class="clipper-folder__back" type="button" aria-label="상위 폴더로 이동" hidden>←</button>
              <nav id="folderBreadcrumbs" class="clipper-folder__crumbs" aria-label="저장 위치 경로"></nav>
            </div>
            <button id="newPlaylistToggle" class="clipper-folder__new" type="button">+ 새 재생목록</button>
          </div>
          <label id="newPlaylistField" class="clipper-folder__create" hidden>
            <span>새 재생목록 이름</span>
            <input id="newPlaylistInput" type="text" placeholder="/에 만들 이름" />
          </label>
          <div id="playlistList" class="clipper-folder__list"></div>
        </div>
        <small id="playlistStatus" class="clipper__field-note"></small>
      </section>

      <label class="clipper__field" data-media-only="true">
        <span>검색 태그</span>
        <input id="tagsInput" type="text" placeholder="예: 린디합, 소셜, 공연" />
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>장르</span>
        <input id="genreInput" type="text" placeholder="예: 스윙, 재즈" />
      </label>

      <button id="saveButton" class="clipper__save" type="button">
        <span>공유 등록폼 열기</span>
      </button>

      <p id="statusText" class="clipper__status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
