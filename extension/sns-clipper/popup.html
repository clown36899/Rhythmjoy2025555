<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>댄스빌보드 공유 등록</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="clipper">
      <header class="clipper__header">
        <img class="clipper__mark" src="icons/icon-48.png" alt="" />
        <div>
          <h1>댄스빌보드 공유 등록</h1>
          <p>YouTube · Instagram</p>
        </div>
      </header>

      <section class="clipper__page">
        <span id="platformBadge" class="clipper__badge">확인 중</span>
        <img id="thumbnailPreview" class="clipper__thumb" alt="" hidden />
        <strong id="pageTitle">현재 페이지를 읽는 중...</strong>
        <small id="pageUrl"></small>
      </section>

      <label class="clipper__field">
        <span>연결 대상</span>
        <select id="targetMode">
          <option value="production">운영 사이트</option>
          <option value="local">로컬 개발 서버</option>
        </select>
      </label>

      <label class="clipper__field">
        <span>등록 대상</span>
        <select id="captureMode">
          <option value="media">SNS 게시물/영상</option>
          <option value="account">인물 계정</option>
        </select>
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>자료 유형</span>
        <select id="bucketInput">
          <option value="reference">참고자료</option>
          <option value="class">강습/루틴</option>
          <option value="performance">공연/잼</option>
          <option value="social">소셜 분위기</option>
          <option value="history">역사/인물</option>
          <option value="music">음악/밴드</option>
        </select>
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>재생목록/폴더</span>
        <select id="playlistInput">
          <option value="">불러오는 중...</option>
        </select>
        <small id="playlistStatus" class="clipper__field-note"></small>
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>새 재생목록</span>
        <input id="newPlaylistInput" type="text" placeholder="저장하면서 만들기" />
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>새 재생목록 위치</span>
        <select id="newPlaylistParentInput">
          <option value="">최상위</option>
        </select>
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>검색 태그</span>
        <input id="tagsInput" type="text" placeholder="예: 린디합, 소셜, 공연" />
      </label>

      <label class="clipper__field" data-media-only="true">
        <span>장르</span>
        <input id="genreInput" type="text" placeholder="예: 스윙, 재즈" />
      </label>

      <button id="saveButton" class="clipper__save" type="button">
        <span>공유 등록폼 열기</span>
      </button>

      <p id="statusText" class="clipper__status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
