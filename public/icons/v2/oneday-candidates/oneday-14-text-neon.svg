<svg width="512" height="560" viewBox="0 0 512 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="30" y="58" width="452" height="446" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#8D9BFF" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.52"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <text x="256" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="950" letter-spacing="1" fill="#FFFFFF">ONE DAY</text>
    <text x="256" y="338" text-anchor="middle" font-family="Pretendard, Inter, Arial, sans-serif" font-size="126" font-weight="950" letter-spacing="-10" fill="#FFFFFF">모집</text>
    <text x="256" y="402" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="950" letter-spacing="4" fill="#F1D85E">RECRUIT</text>
