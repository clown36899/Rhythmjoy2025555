<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Day Recruit Icon Candidates</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #1c1c1d;
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }
    .section {
      margin: 28px 0 14px;
      color: #d9deea;
      font-size: 15px;
      font-weight: 900;
    }
    .card {
      display: grid;
      place-items: center;
      gap: 10px;
      min-height: 190px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: #090a0f;
    }
    img {
      width: 112px;
      height: 124px;
      object-fit: contain;
    }
    span {
      font-size: 13px;
      font-weight: 800;
      color: #d9deea;
    }
  </style>
</head>
<body>
  <h1>원데이 모집 아이콘 후보 10개</h1>
  <div class="section">Shape / Label Candidates</div>
  <div class="grid">
    <div class="card"><img src="./oneday-01-wordmark.svg" alt=""><span>01 Wordmark</span></div>
    <div class="card"><img src="./oneday-02-label.svg" alt=""><span>02 Label</span></div>
    <div class="card"><img src="./oneday-03-sticker.svg" alt=""><span>03 Sticker</span></div>
    <div class="card"><img src="./oneday-04-pill.svg" alt=""><span>04 Pill</span></div>
    <div class="card"><img src="./oneday-05-poster.svg" alt=""><span>05 Poster</span></div>
    <div class="card"><img src="./oneday-06-vertical.svg" alt=""><span>06 Vertical</span></div>
    <div class="card"><img src="./oneday-07-hand.svg" alt=""><span>07 Hand</span></div>
    <div class="card"><img src="./oneday-08-badge.svg" alt=""><span>08 Badge</span></div>
    <div class="card"><img src="./oneday-09-button.svg" alt=""><span>09 Button</span></div>
    <div class="card"><img src="./oneday-10-blacktype.svg" alt=""><span>10 Blacktype</span></div>
  </div>
  <div class="section">Text Only Candidates</div>
  <div class="grid">
    <div class="card"><img src="./oneday-11-text-bold.svg" alt=""><span>11 Text Bold</span></div>
    <div class="card"><img src="./oneday-12-text-korean.svg" alt=""><span>12 Korean</span></div>
    <div class="card"><img src="./oneday-13-text-outline.svg" alt=""><span>13 Outline</span></div>
    <div class="card"><img src="./oneday-14-text-neon.svg" alt=""><span>14 Neon</span></div>
    <div class="card"><img src="./oneday-15-text-compact.svg" alt=""><span>15 Compact</span></div>
    <div class="card"><img src="./oneday-16-text-vertical.svg" alt=""><span>16 Vertical</span></div>
    <div class="card"><img src="./oneday-17-text-yellow.svg" alt=""><span>17 Yellow</span></div>
    <div class="card"><img src="./oneday-18-text-wide.svg" alt=""><span>18 Wide</span></div>
    <div class="card"><img src="./oneday-19-text-round.svg" alt=""><span>19 Round</span></div>
    <div class="card"><img src="./oneday-20-text-red.svg" alt=""><span>20 Red</span></div>
  </div>
</body>
</html>
