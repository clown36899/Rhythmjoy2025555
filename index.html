  <script>
    // [Critical] v48 Armor - Bootstrap Analytics
    (function () {
      window.__LOGS = [];
      window.__BOOT_LOG = function (m, d) {
        var entry = { t: new Date().toISOString(), m: m, d: d };
        window.__LOGS.push(entry);
        console.log('%c[Bootstrap] ' + m, 'background: #333; color: #ffeb3b; font-weight: bold;', d || '');
      };

      window.__BOOT_LOG('Stage 1: Head reached', {
        ua: navigator.userAgent,
        vendor: navigator.vendor,
        pwa: ('standalone' in navigator && navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches
      });

      // 에러 캡처 (Capture Phase)
      window.addEventListener('error', function (e) {
        var src = e.target && (e.target.src || e.target.href);
        window.__BOOT_LOG('🚨 Error Captured', { msg: e.message, src: src, type: e.type });

        // 자산 로드 실패 시 새로고침 (무한 루프 방지 로직 포함)
        if (src && (src.indexOf('chunk') > -1 || src.indexOf('assets') > -1)) {
          var reloadCount = parseInt(sessionStorage.getItem('boot_reload_count') || '0');
          if (reloadCount < 3) {
            window.__BOOT_LOG('⚠️ Asset failed to load. Reloading... (' + (reloadCount + 1) + '/3)');
            sessionStorage.setItem('boot_reload_count', (reloadCount + 1).toString());
            setTimeout(function () { window.location.reload(); }, 1500);
          } else {
            window.__BOOT_LOG('❌ Max reload reached. Stopping loop.');
          }
        }
      }, true);

      // 성공적으로 로드되면 카운트 초기화 (지연 실행)
      window.addEventListener('load', function () {
        setTimeout(function () { sessionStorage.removeItem('boot_reload_count'); }, 3000);
      });

      // 테마 초기화
      try {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark'); // fallback for Private Mode
      }
    })();
  </script>

  <!-- 빌보드 전용 동적 Manifest 전환 (격리 정책 유지) -->
  <script>
    (function () {
      const currentPath = window.location.pathname;
      const baseUrl = window.location.origin;

      // 빌보드 페이지일 때만 정적 manifest를 동적 manifest로 교체
      if (currentPath.includes('/billboard/')) {
        const userId = currentPath.split('/billboard/')[1];
        if (userId) {
          const manifestUrl = window.location.hostname === 'localhost'
            ? 'http://localhost:3001/api/billboard-manifest?userId=' + userId
            : baseUrl + '/.netlify/functions/billboard-manifest?userId=' + userId;
          document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);
        }
      }
    })();

    // PWA 설치 프롬프트 조기 캡처
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('🚀 [index.html] beforeinstallprompt captured early');
      e.preventDefault();
      window.deferredPrompt = e;
      // React 컨텍스트가 로드된 후에도 받을 수 있도록 커스텀 이벤트 발송
      window.dispatchEvent(new CustomEvent('pwaPromptReady', { detail: e }));
    });

    // 유튜브 iframe 콘솔 에러 필터링 (기능에는 영향 없음)
    const originalError = console.error;
    console.error = function (...args) {
      const errorMsg = args[0]?.toString() || '';
      // YouTube 내부 오류 무시
      if (errorMsg.includes('Unknown yt page')) {
        return;
      }
      // postMessage cross-origin 오류 무시 (YouTube iframe 내부 통신)
      if (errorMsg.includes('postMessage') || errorMsg.includes('DOMWindow')) {
        return;
      }
      originalError.apply(console, args);
    };
  </script>

  <!-- Google Translate Script -->
  <script type="text/javascript">
    /**
     * [Isolation Policy] Billboard Kiosk Mode
     * 빌보드는 독립적인 키오스크 모드로 운영되므로 상호작용 UI(번역 등)를 배제한다.
     */
    function googleTranslateElementInit() {
      // 빌보드 페이지에서는 구글 번역 초기화 차단
      if (window.location.pathname.includes('/billboard/')) return;

      new google.translate.TranslateElement(
        {
          pageLanguage: 'ko',
          includedLanguages: 'en',
          autoDisplay: false
          // layout 제거: HORIZONTAL이 기본값이며 .goog-te-combo 요소를 생성함
        },
        'google_translate_element'
      );
    }

    // 언어 변경 함수
    function changeLanguage(lang) {
      if (window.location.pathname.includes('/billboard/')) return;

      const select = document.querySelector('.goog-te-combo');

      if (select) {
        // 한국어 선택 시 번역 끄기 (구글 번역 X 버튼과 동일한 방식)
        if (lang === 'ko') {
          // googtrans 쿠키 삭제 (모든 경로에서)
          document.cookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname;
          document.cookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;';
          // 페이지 새로고침하여 원본 언어로 복원
          window.location.reload();
        } else {
          select.value = lang;
          select.dispatchEvent(new Event('change'));

          // React 컴포넌트에 언어 변경 알림
          window.dispatchEvent(new CustomEvent('languageChanged', { detail: { lang } }));
        }
      } else {
        // Google Translate가 아직 로드되지 않았으면 재시도
        setTimeout(() => changeLanguage(lang), 500);
      }
    }

    // 메뉴 외부 클릭 감지 제거 (토글 방식으로 변경됨)

  </script>

  <!-- PWA Service Worker 등록 + 버전 체크 -->
  <script>
    /**
     * [Isolation Policy] Billboard Kiosk Mode
     * 빌보드는 데이터/배포 실시간 동기화를 위해 SW(캐시)를 사용하지 않고 독립적으로 운영된다.
     */
    if ('serviceWorker' in navigator) {
      // 최초 설치(controller 없음→생김)와 업데이트(controller 교체)를 구분
      var _hadController = !!navigator.serviceWorker.controller;

      // SW 교체 완료 시 자동 리로드 (자신이 트리거했든, 다른 탭이 트리거했든)
      var _swRefreshing = false; // iOS 무한 reload 루프 방지 guard
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        // 최초 설치(controller가 없던 상태→생김)에서는 리로드 불필요
        if (!_hadController) { _hadController = true; return; }
        // 이미 reload 중이면 무시 (iOS에서 controllerchange가 reload를 재유발하는 버그 방어)
        if (_swRefreshing) return;
        _swRefreshing = true;
        // OAuth 콜백 중(code= 파라미터)이면 인증 코드 무효화 방지를 위해 리로드 안 함
        var params = new URLSearchParams(window.location.search);
        if (params.has('code') || params.has('error')) return;
        window.location.reload();
      });

      // 업데이트 대기 플래그: 사용 중에는 리로드하지 않고, 자연스러운 전환 시점에 적용
      // window.__SW_UPDATE_PENDING = true → React 라우트 전환 시 체크
      function autoApplyUpdate(reg) {
        if (window.location.pathname.includes('/billboard/')) return;
        if (!reg || !reg.waiting) return;
        window.__BOOT_LOG && window.__BOOT_LOG('Auto-applying SW update');
        var urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.has('code') && !urlParams.has('error')) {
          try { sessionStorage.clear(); } catch (e) { }
        }
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        // 안전장치: 3초 내 controllerchange가 발생하지 않으면 강제 리로드 (auth 콜백 중엔 스킵)
        setTimeout(function () {
          var p = new URLSearchParams(window.location.search);
          if (!p.has('code') && !p.has('error')) window.location.reload();
        }, 3000);
      }

      // 새 SW가 대기 중임을 표시만 하고, 리로드는 자연스러운 시점까지 미룸
      function markUpdatePending(reg) {
        if (window.location.pathname.includes('/billboard/')) return;
        if (!reg || !reg.waiting) return;
        window.__SW_UPDATE_PENDING = true;
        window.__SW_REG = reg;
        window.__BOOT_LOG && window.__BOOT_LOG('SW update pending (waiting for navigation)');
      }

      window.addEventListener('load', function () {
        // 빌보드 페이지에서는 서비스 워커 등록 및 업데이트 체크 원천 차단
        if (window.location.pathname.includes('/billboard/')) {
          window.__BOOT_LOG && window.__BOOT_LOG('SW Registration Skipped (Billboard Kiosk Mode)');
          return;
        }

        var swUrl = '/service-worker.js?v=20260219_v50';
        navigator.serviceWorker.register(swUrl).then(function (reg) {
          window.__SW_REG = reg;
          window.__BOOT_LOG && window.__BOOT_LOG('SW Registered', { version: 'v50' });

          // 1) 페이지 로드 시 이미 대기 중인 SW가 있을 때 → 즉시 적용 (새로고침/PWA실행 등 자연스러운 진입점)
          if (reg.waiting) {
            if (navigator.serviceWorker.controller) {
              autoApplyUpdate(reg);
            } else {
              // 최초 설치: controller 없음 → skipWaiting으로 즉시 활성화
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            return;
          }

          // 2) 사용 중 새 SW 설치 완료(waiting) → 즉시 리로드하지 않고 대기
          //    라우트 전환/포커스 복귀/다음 페이지 로드 시 적용됨
          reg.addEventListener('updatefound', function () {
            var worker = reg.installing;
            if (!worker) return;
            worker.addEventListener('statechange', function () {
              if (worker.state === 'installed') {
                if (navigator.serviceWorker.controller) {
                  // 사용 중 업데이트 감지: 즉시 적용 (PWA 껐다 켜지 않아도 반영)
                  autoApplyUpdate(reg);
                } else {
                  // 최초 설치: 즉시 활성화
                  reg.waiting && reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
              }
            });
          });
        });

        // 3) PWA 재실행 / 탭 포커스 복귀 시 → 자연스러운 전환 시점이므로 즉시 적용
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible' && window.__SW_REG) {
            // 이미 대기 중인 업데이트가 있으면 즉시 적용
            if (window.__SW_UPDATE_PENDING && window.__SW_REG.waiting) {
              autoApplyUpdate(window.__SW_REG);
              return;
            }
            // 서버에 새 SW가 있는지 체크
            window.__SW_REG.update().then(function () {
              if (window.__SW_REG.waiting && navigator.serviceWorker.controller) {
                autoApplyUpdate(window.__SW_REG);
              }
            }).catch(function () { });
          }
        });
      });
    }

    // version.json 폴링: 배포 감지 (정적 파일이므로 부하가 적으나, 5분 주기로 충분)
    (function () {
      if (window.location.pathname.includes('/billboard/')) return;

      var currentBuild = '__BUILD_TIME__';
      if (!currentBuild || currentBuild.indexOf('TIME') > -1) return;

      function checkVersion() {
        fetch('/version.json?t=' + Date.now())
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.buildTime && data.buildTime !== currentBuild) {
              window.__BOOT_LOG && window.__BOOT_LOG('New build detected: ' + data.buildTime);
              window.navigator.serviceWorker.getRegistration().then(function (reg) {
                if (reg) {
                  // 새 SW 체크 강제 실행 -> updatefound -> installed -> autoApplyUpdate -> reload
                  reg.update();
                } else {
                  // SW가 없는 환경(또는 비활성)이라도 빌드가 바뀌었으면 강제 리로드
                  window.location.reload();
                }
              });
            }
          }).catch(function () { });
      }

      setInterval(checkVersion, 5 * 60 * 1000); // 5분으로 완화하여 과부하 방지

      // 실제 유효한 업데이트 시점은 '사용자가 앱으로 돌아왔을 때'이므로 Focus 체크 유지
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') checkVersion();
      });
    })();
  </script>
