    (function () {
      window.__LOGS = [];

      try {
        bootDebug = /(?:\?|&)bootDebug=true(?:&|$)/.test(location.search) || localStorage.getItem('boot_debug') === 'true';
      } catch (e) {
        bootDebug = false;
      }
      window.__BOOT_LOG = function (m, d) {
        var entry = { t: new Date().toISOString(), m: m, d: d };
        window.__LOGS.push(entry);
        if (bootDebug) {
          console.log('%c[Bootstrap] ' + m, 'background: #333; color: #ffeb3b; font-weight: bold;', d || '');
        }
      };

      window.__BOOT_LOG('Stage 1: Head reached', {
        ua: navigator.userAgent,
        vendor: navigator.vendor,
        pwa: ('standalone' in navigator && navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches
      });

      // 에러 캡처 (Capture Phase)
      window.addEventListener('error', function (e) {
        var src = e.target && (e.target.src || e.target.href);
        window.__BOOT_LOG('🚨 Error Captured', { msg: e.message, src: src, type: e.type });

        // 자산 로드 실패 시 새로고침 (무한 루프 방지 로직 포함)
        if (src && (src.indexOf('chunk') > -1 || src.indexOf('assets') > -1)) {
          var reloadCount = parseInt(sessionStorage.getItem('boot_reload_count') || '0');
          if (reloadCount < 3) {
            window.__BOOT_LOG('⚠️ Asset failed to load. Reloading... (' + (reloadCount + 1) + '/3)');
            sessionStorage.setItem('boot_reload_count', (reloadCount + 1).toString());
            setTimeout(function () { window.location.reload(); }, 1500);
          } else {
            window.__BOOT_LOG('❌ Max reload reached. Stopping loop.');
          }
        }
      }, true);

      // 성공적으로 로드되면 카운트 초기화 (지연 실행)
      window.addEventListener('load', function () {
        setTimeout(function () { sessionStorage.removeItem('boot_reload_count'); }, 3000);
      });

      // 테마 초기화
      try {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark'); // fallback for Private Mode
      }
    })();
  </script>

  <!-- 빌보드 전용 동적 Manifest 전환 (격리 정책 유지) -->
  <script>
    (function () {
      const currentPath = window.location.pathname;
      const baseUrl = window.location.origin;

      // 빌보드 페이지일 때만 정적 manifest를 동적 manifest로 교체
      if (currentPath.includes('/billboard/')) {
        const userId = currentPath.split('/billboard/')[1];
        if (userId) {
          const manifestUrl = window.location.hostname === 'localhost'
            ? 'http://localhost:3001/api/billboard-manifest?userId=' + userId
            : baseUrl + '/api/billboard-manifest?userId=' + userId;
          document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);
        }
      }
    })();

    // PWA 설치 프롬프트 조기 캡처
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      try {
        if (localStorage.getItem('boot_debug') === 'true') {
          console.log('[index.html] beforeinstallprompt captured early');
        }
      } catch (err) { }
      e.preventDefault();
      window.deferredPrompt = e;
      // React 컨텍스트가 로드된 후에도 받을 수 있도록 커스텀 이벤트 발송
      window.dispatchEvent(new CustomEvent('pwaPromptReady', { detail: e }));
    });

    // 유튜브 iframe 콘솔 에러 필터링 (기능에는 영향 없음)
    const originalError = console.error;
    console.error = function (...args) {
      const errorMsg = args[0]?.toString() || '';
      // YouTube 내부 오류 무시
      if (errorMsg.includes('Unknown yt page')) {
        return;
      }
      // postMessage cross-origin 오류 무시 (YouTube iframe 내부 통신)
      if (errorMsg.includes('postMessage') || errorMsg.includes('DOMWindow')) {
        return;
      }
      originalError.apply(console, args);
    };
  </script>

  <!-- Google Translate Script -->
  <script type="text/javascript">
    (function () {
      var TRANSLATE_SCRIPT_ID = 'google-translate-script';
      var TRANSLATE_SCRIPT_SRC = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
      var state = {
        status: 'idle',
        initialized: false,
        loadPromise: null,
        changePromise: null,
        changeTarget: '',
        reloadScheduled: false,
        lastFailureAt: 0,
        cooldownMillis: 30000
      };

      function isBillboardPath() {
        return window.location.pathname.includes('/billboard/');
      }

      function emit(name, detail) {
        window.dispatchEvent(new CustomEvent(name, { detail: detail || {} }));
      }

      function getTranslateSelect() {
        return document.querySelector('.goog-te-combo');
      }

      function hasTranslatedSignal() {
        return document.body.classList.contains('translated-ltr') ||
          document.body.classList.contains('translated-rtl') ||
          document.documentElement.classList.contains('translated-ltr') ||
          document.documentElement.classList.contains('translated-rtl');
      }

      function getGoogtransCookie() {
        var match = document.cookie
          .split(';')
          .map(function (cookie) {
            return cookie.trim();
          })
          .find(function (cookie) {
            return cookie.indexOf('googtrans=') === 0;
          });

        return match ? match.substring('googtrans='.length) : '';
      }

      function hasGoogtransCookie() {
        return getGoogtransCookie() !== '';
      }

      function clearGoogtransCookie() {
        var host = window.location.hostname;
        document.cookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;';

        if (!host) return;

        document.cookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + host + ';';

        if (host.indexOf('.') > -1) {
          document.cookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=.' + host.replace(/^\./, '') + ';';

          var rootDomain = host.split('.').slice(-2).join('.');
          if (rootDomain && rootDomain !== host) {
            document.cookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=.' + rootDomain + ';';
          }
        }
      }

      function setGoogtransCookie(lang) {
        if (lang !== 'en') {
          clearGoogtransCookie();
          return;
        }

        var host = window.location.hostname;
        var value = '/ko/en';
        var cookie = 'googtrans=' + value + '; path=/; max-age=31536000;';
        document.cookie = cookie;

        if (!host) return;

        document.cookie = cookie + ' domain=' + host + ';';

        if (host.indexOf('.') > -1) {
          document.cookie = cookie + ' domain=.' + host.replace(/^\./, '') + ';';

          var rootDomain = host.split('.').slice(-2).join('.');
          if (rootDomain && rootDomain !== host) {
            document.cookie = cookie + ' domain=.' + rootDomain + ';';
          }
        }
      }

      function createDomEvent(type) {
        try {
          return new Event(type, { bubbles: true, cancelable: true });
        } catch (error) {
          var event = document.createEvent('HTMLEvents');
          event.initEvent(type, true, true);
          return event;
        }
      }

      function dispatchTranslateSelectChange(select, lang) {
        select.value = lang;

        if (select.options) {
          Array.prototype.forEach.call(select.options, function (option) {
            option.selected = option.value === lang;
          });
        }

        select.dispatchEvent(createDomEvent('input'));
        select.dispatchEvent(createDomEvent('change'));
      }

      function waitForMillis(milliseconds) {
        return new Promise(function (resolve) {
          window.setTimeout(resolve, milliseconds);
        });
      }

      function waitForTranslationState(lang, timeoutOverrideMillis) {
        return new Promise(function (resolve, reject) {
          var startedAt = Date.now();
          var timeoutMillis = timeoutOverrideMillis || (lang === 'ko' ? 3000 : 22000);

          function poll() {
            if (lang === 'en' && hasTranslatedSignal()) {
              resolve();
              return;
            }

            if (lang === 'ko' && !hasTranslatedSignal() && !hasGoogtransCookie()) {
              resolve();
              return;
            }

            if (Date.now() - startedAt >= timeoutMillis) {
              reject(createTranslateError(
                'translate-timeout',
                'Google Translate did not apply the requested language.'
              ));
              return;
            }

            window.setTimeout(poll, 150);
          }

          poll();
        });
      }

      function scheduleReload() {
        if (state.reloadScheduled) return;

        state.reloadScheduled = true;
        window.setTimeout(function () {
          window.location.reload();
        }, 0);
      }

      function removeTranslateScript() {
        var existingScript = document.getElementById(TRANSLATE_SCRIPT_ID);
        if (existingScript && existingScript.parentNode) {
          existingScript.parentNode.removeChild(existingScript);
        }
      }

      function createTranslateError(reason, message, retryAfterMillis) {
        var error = new Error(message);
        error.reason = reason;
        error.retryAfterMillis = retryAfterMillis || 0;
        return error;
      }

      function markTranslateFailure(reason, message, retryAfterMillis) {
        state.status = 'failed';
        state.loadPromise = null;
        state.lastFailureAt = Date.now();
        emit('googleTranslateError', {
          reason: reason,
          message: message,
          retryAfterMillis: retryAfterMillis || state.cooldownMillis
        });
      }

      function initializeGoogleTranslate() {
        if (isBillboardPath() || state.initialized) return;

        if (!window.google || !window.google.translate || !window.google.translate.TranslateElement) {
          markTranslateFailure('api-missing', 'Google Translate API is not available.');
          return;
        }

        try {
          window.googleTranslateElement = new window.google.translate.TranslateElement(
            {
              pageLanguage: 'ko',
              includedLanguages: 'en',
              autoDisplay: false
            },
            'google_translate_element'
          );
          state.initialized = true;
          state.status = 'ready';
          emit('googleTranslateReady');
        } catch (error) {
          markTranslateFailure('init-failed', error && error.message ? error.message : 'Google Translate initialization failed.');
        }
      }

      function waitForTranslateSelect() {
        return new Promise(function (resolve, reject) {
          var startedAt = Date.now();
          var timeoutMillis = 7000;

          function poll() {
            var select = getTranslateSelect();
            if (select) {
              resolve(select);
              return;
            }

            if (Date.now() - startedAt >= timeoutMillis) {
              reject(createTranslateError('select-timeout', 'Google Translate select was not created.'));
              return;
            }

            window.setTimeout(poll, 200);
          }

          poll();
        });
      }

      function loadGoogleTranslate() {
        if (isBillboardPath()) {
          return Promise.reject(createTranslateError('blocked-path', 'Google Translate is disabled on billboard pages.'));
        }

        if (state.initialized || getTranslateSelect()) {
          state.status = 'ready';
          return Promise.resolve();
        }

        if (window.google && window.google.translate && window.google.translate.TranslateElement) {
          initializeGoogleTranslate();
          return state.status === 'ready'
            ? Promise.resolve()
            : Promise.reject(createTranslateError('init-failed', 'Google Translate initialization failed.'));
        }

        if (state.status === 'failed') {
          var elapsed = Date.now() - state.lastFailureAt;
          if (elapsed < state.cooldownMillis) {
            var retryAfterMillis = state.cooldownMillis - elapsed;
            return Promise.reject(createTranslateError(
              'cooldown',
              'Google Translate is cooling down after a failed load.',
              retryAfterMillis
            ));
          }
          removeTranslateScript();
        }

        if (state.loadPromise) return state.loadPromise;

        state.status = 'loading';
        state.loadPromise = new Promise(function (resolve, reject) {
          var timeoutId = null;

          function cleanup() {
            window.clearTimeout(timeoutId);
            window.removeEventListener('googleTranslateReady', handleReady);
            window.removeEventListener('googleTranslateError', handleError);
          }

          function handleReady() {
            cleanup();
            resolve();
          }

          function handleError(event) {
            cleanup();
            var detail = event.detail || {};
            reject(createTranslateError(
              detail.reason || 'load-failed',
              detail.message || 'Google Translate failed to load.',
              detail.retryAfterMillis || state.cooldownMillis
            ));
          }

          window.addEventListener('googleTranslateReady', handleReady);
          window.addEventListener('googleTranslateError', handleError);

          timeoutId = window.setTimeout(function () {
            markTranslateFailure('load-timeout', 'Google Translate script load timed out.');
          }, 8000);

          var script = document.getElementById(TRANSLATE_SCRIPT_ID);
          if (!script) {
            script = document.createElement('script');
            script.id = TRANSLATE_SCRIPT_ID;
            script.type = 'text/javascript';
            script.src = TRANSLATE_SCRIPT_SRC;
            script.async = true;
            script.onerror = function () {
              removeTranslateScript();
              markTranslateFailure('script-error', 'Google Translate script request failed.');
            };
            document.body.appendChild(script);
          }
        });

        return state.loadPromise;
      }

      function runLanguageChange(lang) {
        if (isBillboardPath()) return Promise.resolve({ ok: false, reason: 'blocked-path' });

        if (lang === 'ko') {
          var shouldReload = hasTranslatedSignal() || hasGoogtransCookie() || getTranslateSelect();
          clearGoogtransCookie();
          emit('languageChanged', { lang: lang });

          if (shouldReload) {
            scheduleReload();
          }

          return Promise.resolve({ ok: true, lang: lang, reloading: shouldReload });
        }

        if (lang !== 'en') {
          return Promise.reject(createTranslateError('unsupported-language', 'Unsupported language: ' + lang));
        }

        return loadGoogleTranslate()
          .then(waitForTranslateSelect)
          .then(function (select) {
            if (hasTranslatedSignal() && getGoogtransCookie().indexOf('/en') > -1) {
              emit('languageChanged', { lang: lang });
              return { ok: true, lang: lang, reused: true };
            }

            setGoogtransCookie(lang);

            return waitForMillis(250)
              .then(function () {
                dispatchTranslateSelectChange(select, lang);
                return waitForTranslationState(lang, 7000);
              })
              .catch(function (error) {
                if (!error || error.reason !== 'translate-timeout') {
                  throw error;
                }

                dispatchTranslateSelectChange(select, lang);
                return waitForTranslationState(lang, 22000);
              })
              .then(function () {
                emit('languageChanged', { lang: lang });
                return { ok: true, lang: lang };
              });
          });
      }

      window.googleTranslateElementInit = initializeGoogleTranslate;

      window.googleTranslateChangeLanguage = function (lang) {
        if (state.reloadScheduled) {
          return Promise.resolve({ ok: true, lang: 'ko', reloading: true });
        }

        if (state.changePromise) {
          if (state.changeTarget === lang) {
            return state.changePromise;
          }

          return Promise.resolve({ ok: false, lang: state.changeTarget, reason: 'change-in-progress' });
        }

        state.changeTarget = lang;
        state.changePromise = runLanguageChange(lang)
          .finally(function () {
            state.changePromise = null;
            state.changeTarget = '';
          });

        return state.changePromise;
      };

      window.changeLanguage = window.googleTranslateChangeLanguage;
    })();
  </script>
