<IfModule security2_module>
    SecRuleRemoveById 960032
    SecRuleRemoveById 1000002

    SecRule REQUEST_METHOD "^TRACE$" "id:1002001,phase:1,deny,log,msg:'TRACE is not allowed'"
    SecRule REQUEST_URI "!^/(api|\.netlify/functions)(/|$)" "id:1002002,phase:1,deny,log,msg:'Method is not allowed by policy outside SwingEnjoy API',chain"
        SecRule REQUEST_METHOD "!^(?:GET|HEAD|POST|OPTIONS)$"
</IfModule>
