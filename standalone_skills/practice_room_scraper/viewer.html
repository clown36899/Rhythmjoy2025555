<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사당 연습실 가격 비교 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --border: #374151;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --highlight: #10b981;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    
    body {
      background-color: var(--bg);
      color: var(--text-main);
      padding: 2rem;
    }

    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: var(--text-muted); font-size: 0.95rem; }

    .table-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background-color: #111827;
      padding: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background-color: var(--surface);
      vertical-align: top;
    }

    tr:hover td {
      background-color: #374151;
    }

    .room-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem; }
    .distance-badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .price-block {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .price-item {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .time-tag {
      background: #4b5563;
      color: #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .price-val {
      color: #34d399;
      font-weight: 700;
    }

    .btn-link {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-link:hover { background: #2563eb; }
    
    .review-count { color: #fbbf24; font-weight: 600; font-size: 0.9rem; }

  </style>
</head>
<body>

  <header>
    <h1>사당 연습실 가격 비교 (시간대별)</h1>
    <p>가격을 꼼꼼하게 비교하고 분석할 수 있는 테이블 뷰입니다.</p>
  </header>

  <div class="table-container">
    <table id="data-table">
      <thead>
        <tr>
          <th width="20%">상호명</th>
          <th width="10%">역 기준 거리</th>
          <th width="50%">시간대별 상세 가격</th>
          <th width="10%">리뷰 수</th>
          <th width="10%">바로가기</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="5" style="text-align:center; padding: 2rem;">데이터를 불러오는 중입니다...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function fetchData() {
      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">수집된 데이터가 없습니다.</td></tr>';
          return;
        }

        data.forEach(item => {
          const tr = document.createElement('tr');
          
          // 가격 데이터 포맷팅 ( " [평일] 5000원 / [주말] 6000원 " => 깔끔한 블록 리스트로 )
          let rawPrice = item.시간대별가격 || item.시간당가격 || '정보 없음';
          let priceHtml = '';
          
          if (rawPrice.includes('/')) {
            const parts = rawPrice.split(' / ');
            priceHtml = '<div class="price-block">' + parts.map(p => {
              // 정규식을 통해 [시간대] 와 가격 분리
              const match = p.match(/^\[(.*?)\]\s*(.*)$/);
              if (match) {
                return `<div class="price-item"><span class="time-tag">${match[1]}</span> <span class="price-val">${match[2]}</span></div>`;
              } else {
                // 대괄호가 없는 경우
                return `<div class="price-item"><span class="price-val">${p}</span></div>`;
              }
            }).join('') + '</div>';
          } else {
            priceHtml = `<div class="price-item"><span class="price-val">${rawPrice}</span></div>`;
          }

          tr.innerHTML = `
            <td>
              <div class="room-name">${item.상호명}</div>
            </td>
            <td>
              <span class="distance-badge">${item.사당역_거리}</span>
            </td>
            <td>
              ${priceHtml}
            </td>
            <td>
              <span class="review-count">★ ${item.리뷰수 || 0}</span>
            </td>
            <td>
              <a href="${item.바로가기 || '#'}" target="_blank" class="btn-link">원본 링크</a>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (e) {
        document.getElementById('table-body').innerHTML = '<tr><td colspan="5" style="text-align:center;">데이터 로드 오류</td></tr>';
      }
    }

    window.addEventListener('DOMContentLoaded', fetchData);
  </script>
</body>
</html>
